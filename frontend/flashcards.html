<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Minds | Flashcards</title>
    <link rel="stylesheet" href="flashcard.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 style="color: #a81a4c">🧠 Pixel Minds</h2>
        <button class="new-chat">+ New Chat</button>

        <div class="menu">
            <a href="chat.html" class="item">💬 AI Chat</a>
            <a href="summary.html" class="item">📄 Summary</a>
            <a href="quiz.html" class="item">❓ Quiz</a>
            <a href="flashcards.html" class="item active">🧠 Flashcards</a>
        </div>

        <div class="profile">
            <div class="avatar">US</div>
            <div>
                <h4>Student</h4>
                <p>PDF Uploaded ✅</p>
            </div>
        </div>
    </div>

    <!-- Main Section -->
    <div class="main">
        <div class="topbar">
            <div>
                <h1 style="color: #85163d;"> AI Flashcards</h1>
                <p class="subtitle">
                    Revise important concepts using AI-generated flashcards.
                </p>
            </div>

            <div class="pdf" id="pdf-filename">
                📄 Loading PDF...
            </div>
        </div>

        <!-- Dynamic Flashcards Container -->
        <div class="flashcards-container" id="flashcards-container">
            <div class="loading-msg" style="text-align: center; width: 100%; color: #666;">
                ⏳ Generating flashcards from your uploaded PDF...
            </div>
        </div>

        <!-- Bottom Buttons -->
        <div class="quick-actions">
            <button id="prev-btn">⬅ Previous</button>
            <button id="next-btn">Next ➡</button>

            <a href="quiz.html">
                <button>📝 Take Quiz</button>
            </a>
            <a href="summary.html">
                <button>📄 View Summary</button>
            </a>
            <a href="index.html">
                <button>🏠 Home</button>
            </a>
        </div>
    </div>

</div>

<!-- Configuration File -->
<script src="config.js"></script>

<!-- Dynamic Logic Script -->
<script>
    const flashcardsContainer = document.getElementById('flashcards-container');

    async function loadFlashcards() {
        try {
            // 1. Check if a PDF is actually uploaded first
            let pdfText = localStorage.getItem("extracted_pdf_text");

            if (!pdfText) {
                flashcardsContainer.innerHTML = `<div style="text-align: center; width: 100%; color: #666; padding: 20px;">No notes found. Please <a href="index.html">upload a PDF</a> first.</div>`;
                return;
            }

            if (pdfText === "PDF uploaded successfully. Backend is handling the text.") {
                pdfText = "";
            }

            // Call backend API for flashcard data
            const response = await fetch(`${API_URL}/flashcards`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    text: pdfText,
                    user_id: "student_1"
                })
            });

            const data = await response.json();
            
            // 2. Safely handle backend errors (like Groq Rate Limits)
            if (data.status === "error" || data.error) {
                flashcardsContainer.innerHTML = `<div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">❌ ${data.message || data.error}</div>`;
                return;
            }

            // Clear loading indicator
            flashcardsContainer.innerHTML = '';

            // Expecting data format: { flashcards: [{ question: "...", answer: "..." }] }
            const cards = data.flashcards || data;

            // 3. Ensure cards is an array before looping
            if (!Array.isArray(cards) || cards.length === 0) {
                flashcardsContainer.innerHTML = `<p style="color: #666; text-align: center; width: 100%;">No flashcards could be generated for this PDF.</p>`;
                return;
            }

            // Dynamically create flashcard elements
            cards.forEach(card => {
                const cardDiv = document.createElement('div');
                cardDiv.className = 'flashcard';
                cardDiv.innerHTML = `
                    <h3>Question</h3>
                    <p>${card.question}</p>
                    <hr>
                    <h3>Answer</h3>
                    <p>${card.answer}</p>
                `;
                flashcardsContainer.appendChild(cardDiv);
            });

        } catch (error) {
            console.error("Flashcards Load Error:", error);
            flashcardsContainer.innerHTML = `
                <div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">
                    ❌ Failed to load flashcards. Please check if your backend server is running.
                </div>
            `;
        }
    }

    // Load flashcards on page start
    document.addEventListener('DOMContentLoaded', loadFlashcards);
</script>

</body>
</html>
