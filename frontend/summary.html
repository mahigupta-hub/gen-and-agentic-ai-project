<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Minds | Summary</title>
    <link rel="stylesheet" href="summary2.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 style="color: #a81a4c;">🧠 Pixel Minds</h2>
        <button class="new-chat">+ New Chat</button>

        <div class="menu">
            <a href="chat.html" class="item">💬 AI Chat</a>
            <a href="summary.html" class="item active">📄 Summary</a>
            <a href="quiz.html" class="item">❓ Quiz</a>
            <a href="flashcards.html" class="item">🧠 Flashcards</a>
        </div>

        <div class="profile" style="margin-left: 0;">
            <div class="avatar">US</div>
            <div>
                <h4>Student</h4>
                <p>PDF Uploaded ✅</p>
            </div>
        </div>
    </div>
        
    <!-- Main Content -->
    <div class="main">
        <div class="topbar">
            <div>
                <h1> Generate Summary</h1>
                <p class="subtitle">
                    Your uploaded notes have been summarized.
                </p>
            </div>

            <div class="pdf" id="pdf-filename">
                📄 Loading PDF...
            </div>
        </div>

        <!-- Dynamic Summary Container -->
        <div class="summary-box" id="summary-box">
            <div class="loading-msg" style="text-align: center; width: 100%; color: #666; padding: 20px;">
                ⏳ Reading document and generating summary...
            </div>
        </div>

        <!-- Bottom Buttons -->
        <div class="bottom-buttons">
            <button>📥 Download PDF</button>
            <button id="copy-btn">📋 Copy Summary</button>

            <a href="chat.html">
                <button>💬 Ask AI</button>
            </a>
            <a href="index.html">
                <button>🏠 Home</button>
            </a>
        </div>
    </div>

</div>

<!-- Central Configuration -->
<script src="config.js"></script>

<!-- Dynamic Logic Script -->
<script>
    const summaryBox = document.getElementById('summary-box');
    const copyBtn = document.getElementById('copy-btn');

    let rawSummaryText = "";

    async function loadSummary() {
        try {
            // 1. Check if a PDF is actually uploaded first
            let pdfText = localStorage.getItem("extracted_pdf_text");

            if (!pdfText) {
                summaryBox.innerHTML = `<div style="text-align: center; width: 100%; color: #666; padding: 20px;">No notes found. Please <a href="index.html">upload a PDF</a> first.</div>`;
                copyBtn.style.display = 'none';
                return;
            }

            if (pdfText === "PDF uploaded successfully. Backend is handling the text.") {
                pdfText = "";
            }

            const response = await fetch(`${API_URL}/summary`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    text: pdfText,
                    user_id: "student_1" 
                })
            });

            const data = await response.json();
            
            // 2. Safely handle backend errors
            if (data.status === "error" || data.error) {
                summaryBox.innerHTML = `<div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">❌ ${data.message || data.error}</div>`;
                copyBtn.style.display = 'none';
                return;
            }

            // Clear loading text
            summaryBox.innerHTML = '';

            const summaryContent = data.summary || data.data || data;

            if (!summaryContent) {
                summaryBox.innerHTML = `<p style="color: #666; text-align: center;">No summary could be generated for this PDF.</p>`;
                copyBtn.style.display = 'none';
                return;
            }

            copyBtn.style.display = 'inline-block';

            rawSummaryText = typeof summaryContent === 'string' ? summaryContent : JSON.stringify(summaryContent, null, 2);

            const summaryCard = document.createElement('div');
            summaryCard.className = 'summary-card';
            
            summaryCard.innerHTML = `
                <h2>Document Summary</h2>
                <p style="white-space: pre-wrap; line-height: 1.6;">${rawSummaryText}</p>
            `;
            
            summaryBox.appendChild(summaryCard);

        } catch (error) {
            console.error("Summary Load Error:", error);
            summaryBox.innerHTML = `
                <div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">
                    ❌ Failed to load summary. Please check if your backend server is running.
                </div>
            `;
            copyBtn.style.display = 'none';
        }
    }

    copyBtn.addEventListener('click', () => {
        if (!rawSummaryText) return;
        
        navigator.clipboard.writeText(rawSummaryText).then(() => {
            const originalText = copyBtn.innerHTML;
            copyBtn.innerHTML = "✅ Copied!";
            setTimeout(() => {
                copyBtn.innerHTML = originalText;
            }, 2000);
        }).catch(err => {
            console.error("Failed to copy text: ", err);
        });
    });

    document.addEventListener('DOMContentLoaded', loadSummary);
</script>

</body>
</html>
