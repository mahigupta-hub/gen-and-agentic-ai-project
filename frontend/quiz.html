<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pixel Minds | Quiz</title>
    <link rel="stylesheet" href="quiz.css">
</head>

<body>

<div class="container">

    <!-- Sidebar -->
    <div class="sidebar">
        <h2 style="color: #a81a4c;">🧠 Pixel Minds</h2>
        <button class="new-chat">+ New Chat</button>

        <div class="menu">
            <a href="chat.html" class="item">💬 AI Chat</a>
            <a href="summary.html" class="item">📄 Summary</a>
            <a href="quiz.html" class="item active">❓ Quiz</a>
            <a href="flashcards.html" class="item">🧠 Flashcards</a>
        </div>

        <div class="profile">
            <div class="avatar">US</div>
            <div>
                <h4>Student</h4>
                <p>PDF Uploaded ✅</p>
            </div>
        </div>
    </div>

    <!-- Main Section -->
    <div class="main">

        <div class="topbar">
            <div>
                <h1 style="color: #85163d;"> AI Generated Quiz</h1>
                <p class="subtitle">
                    Test your understanding with automatically generated questions.
                </p>
            </div>

            <div class="pdf" id="pdf-filename">
                📄 Loading PDF...
            </div>
        </div>

        <!-- Quiz Container -->
        <div class="quiz-box" id="quiz-box">
            <div class="loading-msg" style="text-align: center; width: 100%; color: #666; padding: 20px;">
                ⏳ Generating quiz from your uploaded PDF...
            </div>
        </div>

        <!-- Buttons -->
        <div class="buttons">
            <button id="submit-btn">✅ Submit Quiz</button>

            <a href="flashcards.html">
                <button>🧠 Flashcards</button>
            </a>
            <a href="summary.html">
                <button>📄 Summary</button>
            </a>
            <a href="chat.html">
                <button>💬 Ask AI</button>
            </a>
            <a href="index.html">
                <button>🏠 Home</button>
            </a>
        </div>

    </div>

</div>

<!-- Central Configuration -->
<script src="config.js"></script>

<!-- Dynamic Logic Script -->
<script>
    const quizBox = document.getElementById('quiz-box');
    const submitBtn = document.getElementById('submit-btn');

    let currentQuestions = [];

    // Note: We removed the manual PDF name loading here because config.js handles it!

    async function loadQuiz() {
        try {
            // 1. Check if a PDF is actually uploaded first
            const pdfText = localStorage.getItem("extracted_pdf_text");

            if (!pdfText) {
                quizBox.innerHTML = `<div style="text-align: center; width: 100%; color: #666; padding: 20px;">No notes found. Please <a href="index.html">upload a PDF</a> first.</div>`;
                submitBtn.style.display = 'none'; // Hide submit button
                return;
            }

            const response = await fetch(`${API_URL}/quiz`, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ 
                    text: pdfText,
                    user_id: "student_1" 
                })
            });

            const data = await response.json();
            
            // 2. Safely handle backend errors (like Groq Rate Limits)
            if (data.status === "error" || data.error) {
                quizBox.innerHTML = `<div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">❌ ${data.message || data.error}</div>`;
                submitBtn.style.display = 'none'; // Hide submit button
                return;
            }

            // Format expected: { questions: [ { question: "...", options: ["A", "B", ...], answer: "A" } ] }
            currentQuestions = data.questions || data;

            quizBox.innerHTML = '';

            // 3. Ensure currentQuestions is actually an array before looping
            if (!Array.isArray(currentQuestions) || currentQuestions.length === 0) {
                quizBox.innerHTML = `<p style="color: #666; text-align: center;">No quiz questions could be generated for this PDF.</p>`;
                submitBtn.style.display = 'none';
                return;
            }

            // Ensure submit button is visible if questions load successfully
            submitBtn.style.display = 'inline-block';

            // Render each question
            currentQuestions.forEach((q, qIndex) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question';

                let optionsHTML = '';
                q.options.forEach((opt, optIndex) => {
                    optionsHTML += `
                        <label class="option">
                            <input type="radio" name="q${qIndex}" value="${opt}">
                            ${opt}
                        </label>
                    `;
                });

                qDiv.innerHTML = `
                    <h2>${qIndex + 1}. ${q.question}</h2>
                    ${optionsHTML}
                `;
                quizBox.appendChild(qDiv);
            });

        } catch (error) {
            console.error("Quiz Load Error:", error);
            quizBox.innerHTML = `
                <div style="color: #c52c62; text-align: center; width: 100%; padding: 20px;">
                    ❌ Failed to load quiz. Please check if your backend server is running.
                </div>
            `;
            submitBtn.style.display = 'none';
        }
    }

    // Evaluate answers and present score
    function submitQuiz() {
        if (!currentQuestions || currentQuestions.length === 0) return;

        let score = 0;

        currentQuestions.forEach((q, qIndex) => {
            const selectedOption = document.querySelector(`input[name="q${qIndex}"]:checked`);
            if (selectedOption && selectedOption.value === q.answer) {
                score++;
            }
        });

        // Remove old score card if present
        const oldScoreCard = document.querySelector('.score-card');
        if (oldScoreCard) oldScoreCard.remove();

        // Create score card element
        const scoreCard = document.createElement('div');
        scoreCard.className = 'score-card';
        scoreCard.innerHTML = `
            <h2>🏆 Quiz Result</h2>
            <p>Your Score: <strong>${score} / ${currentQuestions.length}</strong></p>
            <p>${score === currentQuestions.length ? '🎉 Perfect Score!' : 'Keep revising your notes!'}</p>
        `;

        quizBox.appendChild(scoreCard);
        scoreCard.scrollIntoView({ behavior: 'smooth' });
    }

    submitBtn.addEventListener('click', submitQuiz);
    document.addEventListener('DOMContentLoaded', loadQuiz);
</script>

</body>
</html>
